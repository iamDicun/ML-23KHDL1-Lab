<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human Label CSV Editor</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #d1d5db;
        --edited: #fff8db;
        --ok: #0a7d2c;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 1400px;
        margin: 20px auto;
        padding: 0 16px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .status {
        font-size: 14px;
        color: var(--muted);
      }
      .status.ok {
        color: var(--ok);
      }
      .table-wrap {
        overflow: auto;
        max-height: 78vh;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1100px;
      }
      th,
      td {
        border-bottom: 1px solid #e5e7eb;
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
        font-size: 14px;
      }
      th {
        position: sticky;
        top: 0;
        background: #f9fafb;
        z-index: 1;
      }
      tr.edited {
        background: var(--edited);
      }
      .review {
        min-width: 500px;
        max-width: 700px;
        line-height: 1.35;
      }
      select {
        width: 110px;
        padding: 5px 6px;
      }
      .pill {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="top">
          <div>
            <h2 style="margin: 0">Human Label CSV Editor</h2>
            <div class="status" id="filePath"></div>
          </div>
          <div>
            <span class="pill">0 = none</span>
            <span class="pill">1 = positive</span>
            <span class="pill">2 = negative</span>
          </div>
        </div>
        <div class="status" id="status">Đang tải dữ liệu...</div>
        <div class="table-wrap">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
